<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lilly Riemer — Brand Designer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper: #f1ede6;
    --paper-2: #e8e3d9;
    --ink: #0c0c0c;
    --ink-soft: #1a1a1a;
    --muted: #6b6760;
    --rule: rgba(12,12,12,.18);
    --accent: #004DFF;
    --accent-soft: #b9b9ee;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; background: var(--paper); color: var(--ink); }
  body{
    font-family: 'Inter Tight', 'Neue Montreal', system-ui, sans-serif;
    font-feature-settings: "ss01","cv11";
    letter-spacing: -0.015em;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
 
  .hero{
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 28px 0 32px clamp(20px, 4vw, 56px);
    display: flex;
    flex-direction: column;
  }

  .top{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    gap: 24px;
    flex-wrap: wrap;
  }
  .top .dot{ width:8px; height:8px; border-radius: 50%; background: var(--accent); display:inline-block; vertical-align: 2px; margin-right: 10px; animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ transform: scale(1); opacity:1; } 50%{ transform: scale(1.4); opacity:.55; } }
  .top .col{ display:flex; flex-direction:column; gap: 4px; }
  .top .col.r{ text-align: right; align-items: flex-end; }
  .top .muted{ color: var(--muted); }
  .top .time{ font-variant-numeric: tabular-nums; }

  .stage{
    flex: 1;
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    gap: clamp(24px, 4vw, 64px);
    align-items: stretch;
    margin-top: clamp(36px, 7vh, 88px);
  }

  .left{
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: clamp(20px, 3vh, 28px);
  }
  .eyebrow .bar{ display:inline-block; width: 28px; height: 2px; background: var(--ink); }

  .display{
    font-weight: 500;
    font-size: clamp(48px, 7.4vw, 124px);
    line-height: 0.92;
    letter-spacing: -0.04em;
    text-wrap: balance;
    margin: 0;
  }
  .display .line{ display: block; overflow: hidden; padding-bottom: 0.22em; }
  .display .word{
    display: inline-block;
    transform: translateY(110%);
    opacity: 0;
    animation: rise .9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .display .word.sp::after{ content: "\00a0"; }
  @keyframes rise{ to{ transform: translateY(0); opacity: 1; } }

  .swap{
    position: relative;
    color: var(--accent);
    display: inline-flex;
    align-items: baseline;
    vertical-align: baseline;
  }
  .swap .stack{
    position: relative;
    display: inline-block;
    height: 1em;
    line-height: 1;
    overflow: hidden;
    vertical-align: baseline;
  }
  .swap .stack .opt{
    display: block;
    transition: transform .55s cubic-bezier(.2,.8,.2,1), opacity .55s ease;
    will-change: transform, opacity;
  }
  .swap-underline{
    position: absolute;
    left: -2px; right: -2px; bottom: -0.04em;
    height: 0.14em;
    pointer-events: none;
    overflow: visible;
  }
  .swap-underline path{
    fill: none;
    stroke: #F9D5E7;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: draw 1.4s 1.6s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset: 0; } }

  .lede{
    font-size: clamp(17px, 1.4vw, 21px);
    line-height: 1.45;
    color: var(--ink-soft);
    max-width: 46ch;
    margin: clamp(28px, 4vh, 44px) 0 0;
    opacity: 0;
    animation: fadeUp .9s 1.4s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .lede em{
    font-style: normal;
    background: linear-gradient(transparent 60%, #F9D5E7 60%);
    padding: 0 .12em;
  }

  .ctas{
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-top: clamp(28px, 4vh, 40px);
    opacity: 0;
    animation: fadeUp .9s 1.7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .btn{
    --bg: var(--ink); --fg: var(--paper);
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px 18px 30px;
    background: var(--bg);
    color: var(--fg);
    border-radius: 999px;
    text-decoration: none;
    font-family: 'Inter Tight', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
    border: none;
    cursor: pointer;
    overflow: hidden;
    transition: transform .25s ease;
  }
  .btn:hover{ transform: translateY(-2px); }
  .btn .arrow{
    width: 22px; height: 22px;
    display: inline-flex; align-items:center; justify-content:center;
    background: var(--paper); color: var(--ink);
    border-radius: 50%;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .btn:hover .arrow{ transform: translateX(4px) rotate(-8deg); }
  .btn .arrow svg{ width: 11px; height: 11px; display:block; }

  .btn.ghost{
    --bg: transparent; --fg: var(--ink);
    border: 1.5px solid var(--ink);
  }
  .btn.ghost .arrow{ background: var(--ink); color: var(--paper); }

  .scribble-wrap{ position: relative; display: inline-block; }
  .scribble{
    position: absolute;
    left: -10px; right: -10px;
    bottom: -22px;
    width: calc(100% + 20px);
    height: 26px;
    pointer-events: none;
  }
  .scribble path{
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: draw 1.6s 2.2s cubic-bezier(.2,.8,.2,1) forwards;
  }

  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(14px); }
    to  { opacity: 1; transform: translateY(0); }
  }

  .right{
    position: relative;
    min-height: 420px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .portrait-stage{
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 520px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .portrait{
    position: relative;
    width: clamp(320px, 36vw, 540px);
    aspect-ratio: 2400 / 3000;
    z-index: 2;
    animation: float 8s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .portrait img{
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: bottom center;
    display: block;
    filter: drop-shadow(0 30px 30px rgba(12,12,12,0.08));
  }
  @keyframes float{
    0%, 100%{ transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-10px) rotate(-0.4deg); }
  }

  .halo{
    position: absolute;
    z-index: 1;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    width: clamp(320px, 34vw, 540px);
    aspect-ratio: 1;
    border-radius: 50%;
    background: var(--paper-2);
    opacity: 0;
    animation: haloIn 1.2s .3s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes haloIn{
    from{ opacity: 0; transform: translate(-50%, 12px) scale(.92); }
    to  { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }

  .badge{
    position: absolute;
    z-index: 3;
    top: clamp(20px, 4vh, 60px);
    right: clamp(20px, 3vw, 56px);
    width: clamp(120px, 12vw, 168px);
    aspect-ratio: 1;
    color: var(--ink);
    opacity: 0;
    animation: badgeIn .8s 1.2s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes badgeIn{
    from{ opacity: 0; transform: scale(.8) rotate(-20deg); }
    to  { opacity: 1; transform: scale(1) rotate(0); }
  }
  .badge .spin{ animation: spin 22s linear infinite; transform-origin: 50% 50%; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .badge svg{ width:100%; height:100%; display:block; }

  .tag{
    position: absolute;
    z-index: 3;
    bottom: clamp(40px, 8vh, 80px);
    left: clamp(-8px, 0vw, 8px);
    background: var(--accent);
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 14px;
    border-radius: 4px;
    transform: rotate(-6deg);
    box-shadow: 0 14px 24px rgba(0, 77, 255, 0.18);
    opacity: 0;
    animation: tagIn .7s 1.6s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes tagIn{
    from{ opacity: 0; transform: rotate(0deg) translateY(10px); }
    to  { opacity: 1; transform: rotate(-6deg) translateY(0); }
  }

  .bottom{
    margin-top: clamp(36px, 6vh, 64px);
    padding-top: 18px;
    padding-right: clamp(20px, 4vw, 56px);
    display: flex;
    align-items: center;
    opacity: 0;
    animation: fadeUp .9s 2s cubic-bezier(.2,.8,.2,1) forwards;
  }

  .mark{ display: inline-flex; align-items: center; gap: 10px; color: var(--ink); }
  .mark img{ display:block; height: 28px; width: auto; }

  .doodle{
    position: absolute;
    pointer-events: none;
    color: var(--accent);
    opacity: .9;
  }
  .doodle.d1{
    top: clamp(160px, 22vh, 260px);
    left: clamp(-20px, 4vw, 60px);
    width: clamp(60px, 6vw, 92px);
    color: #F9D5E7;
    transform: rotate(-12deg);
    animation: bob 6s ease-in-out infinite;
  }
  .doodle.d2{
    bottom: 22%;
    right: 38%;
    width: clamp(40px, 4vw, 64px);
    color: #F9D5E7;
    animation: bob 7s 1s ease-in-out infinite reverse;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) rotate(-12deg); }
    50%    { transform: translateY(-10px) rotate(-8deg); }
  }

  @media (max-width: 900px){
    .stage{ grid-template-columns: 1fr; gap: 24px; margin-top: 24px; }
    .right{ order: -1; min-height: 360px; }
    .portrait-stage{ min-height: 380px; }
    .portrait{ width: 220px; }
    .badge{ width: 96px; top: 8px; right: 8px; }
  }
  @media (max-width: 560px){
    .top{ font-size: 11px; }
    .ctas{ gap: 16px; }
    .btn{ padding: 14px 22px; font-size: 15px; }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .display .word{ transform: none; opacity: 1; }
    .swap-underline path, .scribble path{ stroke-dashoffset: 0; }
  }
</style>
</head>

<section class="hero" data-screen-label="Hero">

  </svg>

  <div class="stage">

    <div class="left">
      <div>
        <h1 class="display" id="headline">
          <span class="line"><span class="word" style="animation-delay: .05s">You're</span><span class="word sp" style="animation-delay: .15s"></span><span class="word" style="animation-delay: .15s">here</span><span class="word sp" style="animation-delay: .25s"></span><span class="word" style="animation-delay: .25s">because</span></span>
          <span class="line"><span class="word" style="animation-delay: .35s">something</span><span class="word sp" style="animation-delay: .45s"></span><span class="word" style="animation-delay: .45s">feels</span></span>
          <span class="line"><span class="word" style="animation-delay: .55s">
            <span class="swap" aria-label="off">
              <span class="stack" id="swap-stack">
                <span class="opt">off.</span>
              </span>
              <svg class="swap-underline" viewBox="0 0 400 24" preserveAspectRatio="none" aria-hidden="true">
                <path d="M4 14 C 80 6, 160 22, 240 12 S 380 8, 396 14"/>
              </svg>
            </span>
          </span></span>
        </h1>

        <p class="lede">
          I'm Lilly — a brand designer building <em>identity systems</em> for founders who want a brand that doesn't just look right, but holds its shape under pressure. Logos, voice, the whole vocabulary.
        </p>
      </div>

      <div class="ctas">
        <span class="scribble-wrap">
          <a href="https://www.lillyriemer.com/contact" class="btn" id="cta">
            Start a project
            <span class="arrow" aria-hidden="true">
              <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </a>
          <svg class="scribble" viewBox="0 0 240 26" preserveAspectRatio="none" aria-hidden="true">
            <path d="M6 16 C 40 4, 80 24, 130 14 S 210 4, 234 16"/>
          </svg>
        </span>

        <a href="https://www.lillyriemer.com/branding" class="btn ghost">
          See the work
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </a>
      </div>
    </div>

<script>
  (function(){
    const stack = document.getElementById('swap-stack');
    const host = document.querySelector('.swap');
    if (!stack || !host) return;

    const words = ['off.', 'blurry.', 'close, but not it.', 'quietly broken.'];
    let i = 0;
    let current = stack.querySelector('.opt');

    function setLabel(w){ host.setAttribute('aria-label', w.replace(/\.+$/, '')); }
    setLabel(words[0]);

    function next(){
      i = (i + 1) % words.length;
      const incoming = document.createElement('span');
      incoming.className = 'opt';
      incoming.textContent = words[i];
      incoming.style.transform = 'translateY(100%)';
      incoming.style.opacity = '0';
      stack.appendChild(incoming);

      void incoming.offsetWidth;

      current.style.transform = 'translateY(-100%)';
      current.style.opacity = '0';
      incoming.style.transform = 'translateY(0)';
      incoming.style.opacity = '1';

      setLabel(words[i]);

      const prev = current;
      current = incoming;
      setTimeout(() => { if (prev && prev.parentNode === stack) prev.remove(); }, 700);
    }

    setTimeout(() => {
      next();
      setInterval(next, 2600);
    }, 2800);
  })();

  (function(){
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const targets = [
      { el: document.querySelector('.doodle.d1'), strength: 18 },
      { el: document.querySelector('.doodle.d2'), strength: 12 },
      { el: document.querySelector('.badge'),     strength: 10 },
      { el: document.querySelector('.portrait'),  strength: 6 },
    ].filter(t => t.el);

    let raf = 0, tx = 0, ty = 0;
    window.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      tx = (e.clientX - cx) / cx;
      ty = (e.clientY - cy) / cy;
      if (!raf) raf = requestAnimationFrame(apply);
    }, { passive: true });

    function apply(){
      raf = 0;
      targets.forEach(t => {
        t.el.style.translate = `${tx * t.strength}px ${ty * t.strength}px`;
      });
    }
  })();
</script>
